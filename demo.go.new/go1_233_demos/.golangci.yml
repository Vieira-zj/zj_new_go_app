# options for analysis running
run:
  timeout: 30m # due to runner CPU throttled issue
  concurrency: 4 # set it to 4 as this is the runner CPU quota in mose cases

  # which dirs to skip
  skip-dirs:
    - spex/gen # existing BFF/BASS convention for generated pb files
    - internal/proto/spex # new unified project templates convention for generated pb files

  # which files to skip
  skip-files:
    - ".*.gen.go$" # code generated by go generate
    - ".*.pb.go$"  # code generated by protobuf

# all available settings of specific linters
linters-settings:
  errcheck:
    # report about not checking of errors in type assertions: `a := b.(MyStruct)`
    check-type-assertions: true
  gocyclo:
    # minimal code complexity to report, 30 by default (but we recommend 10-20)
    min-complexity: 20
  goimports:
    # put imports beginning with prefix after 3rd-party packages
    local-prefixes: git.garena.com
  govet:
    # report about shadowed variables
    shadow: true
  misspell:
    # Correct spellings using locale preferences for US or UK.
    # Default is to use a neutral variety of English.
    # Setting locale to US will correct the British spelling of 'colour' to 'color'.
    locale: US
  nakedret:
    # make an issue if func has more lines of code than this setting and it has naked returns; default is 30
    max-func-lines: 30
  prealloc:
    simple: true
    range-loops: true # Report preallocation suggestions on range loops
    for-loops: true # Report preallocation suggestions on for loops
  predeclared:
    # include method names and field names (i.e., qualified names) in checks
    q: true

linters:
  disable-all: true # disable those linters we don't want
  enable:
    # default linters recommended by golangci-lint
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - typecheck

    # others
    - revive # 6x faster, drop-in replacement of golint
    - stylecheck # stylecheck is a replacement for golint
    - goimports # checks unused imports and some formatting
    - dupl # finds duplicated code: https://github.com/mibk/dupl/blob/master/_output_example/docker.html
    - gocyclo # checks cyclomatic complexity
    - gosec # checks security problems such as SQL query construction using string concatenation
    - misspell # finds commonly misspelled English words in comments
    - nakedret # finds naked returns in long functions
    - prealloc # finds slice declarations that could potentially be preallocated
    - unconvert # remove unnecessary type conversions
    - unparam # detects unused function parameters
    - goconst # finds repeated strings that could be replaced by a constant
    - bodyclose # checks whether HTTP response body is closed successfully
    - funlen # detects long functions
    - lll # detects long lines
    - predeclared # find code that shadows one of Go's predeclared identifiers

severity:
  default-severity: info
  rules:
    - linters:
        - errcheck
        - gosec
      severity: critical
    - linters:
        - gocyclo
        - prealloc
        - bodyclose
      severity: blocker
    - linters:
        - govet
        - staticcheck
        - typecheck
        - goimports
        - funlen
        - predeclared
      severity: major
    - linters:
        - gosimple
        - ineffassign
        - revive
        - stylecheck
        - dupl
        - misspell
        - nakedret
        - unconvert
        - unparam
        - goconst
        - lll
      severity: minor


issues:
  # Maximum issues count per one linter. Set to 0 to disable.
  max-issues-per-linter: 0
  # Maximum count of issues with the same text. Set to 0 to disable.
  max-same-issues: 0
